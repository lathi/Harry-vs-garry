<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚽ WC 2026 – Harry vs Garry</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDCAV-T_P1CkCzAg7g6VC991rFI-hBxUF0",
    authDomain: "garryvsharry.firebaseapp.com",
    projectId: "garryvsharry",
    storageBucket: "garryvsharry.firebasestorage.app",
    messagingSenderId: "736527270681",
    appId: "1:736527270681:web:d8a0a2731c59f7a071bb88"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const ROUNDS = ["R32","R16","QF","SF","F"];
  const ROUND_LABELS = { R32:"Round of 32", R16:"Round of 16", QF:"Quarter Finals", SF:"Semi Finals", F:"Final" };
  const MATCH_COUNT = { R32:16, R16:8, QF:4, SF:2, F:1 };

  const NEW_PROGRESS = 5;
  const NEW_SCORE = 10;
  const GS_GARRY = 1425;
  const GS_HARRY = 1285;

  let state = { matches:{}, og:{}, newpred:{}, bracket:{} };

  function el(id){ return document.getElementById(id); }

  window.addEventListener("DOMContentLoaded", () => {
    buildUI();
    listenDB();
  });

  function listenDB(){
    onValue(ref(db, "/"), snap => {
      state = snap.val() || { matches:{}, og:{}, newpred:{}, bracket:{} };
      state.matches = state.matches || {};
      state.og = state.og || {};
      state.newpred = state.newpred || {};
      renderAll();
    });
  }

  function buildUI(){
    const root = el("root");
    root.innerHTML = `
      <header>
        <div class="header-inner"><div class="logo">⚽ WC 2026</div><div class="subtitle">Harry vs Garry – Prediction Battle</div></div>
        <div id="leaderboard" class="leaderboard"></div>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="og">🎯 OG Predictions</button>
        <button class="tab" data-tab="newpred">🔮 New Predictions</button>
        <button class="tab" data-tab="admin">📋 Results Admin</button>
        <button class="tab" data-tab="group">📊 Group Stage</button>
      </nav>

      <main>
        <div id="tab-og" class="tab-panel active"></div>
        <div id="tab-newpred" class="tab-panel"></div>
        <div id="tab-admin" class="tab-panel">
          <div class="section-header">
            <h2>📋 Results Admin</h2>
            <p>Save fixtures first → then add results. Fixtures will appear in New Predictions.</p>
          </div>
          <div id="admin-container"></div>
        </div>
        <div id="tab-group" class="tab-panel">
          <div class="card"><h2>Group Stage</h2><p>Garry: ${GS_GARRY} | Harry: ${GS_HARRY}</p></div>
        </div>
      </main>
    `;

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        el("tab-" + btn.dataset.tab).classList.add("active");
      });
    });
  }

  function renderAll(){
    renderLeaderboard();
    renderOG();
    renderNewPred();
    renderAdmin();
  }

  function renderLeaderboard(){
    const harryNP = calcNewScore("harry");
    const garryNP = calcNewScore("garry");
    el("leaderboard").innerHTML = `
      <div class="lb-card"><div class="lb-name harry-color">Harry</div><div class="lb-total">${harryNP}</div></div>
      <div class="lb-vs">vs</div>
      <div class="lb-card"><div class="lb-name garry-color">Garry</div><div class="lb-total">${garryNP}</div></div>
    `;
  }

  function calcNewScore(player){
    let pts = 0;
    const np = state.newpred?.[player] || {};
    for(const round of ROUNDS){
      const roundMatches = state.matches?.[round] || {};
      const npRound = np[round] || {};
      for(let i = 0; i < MATCH_COUNT[round]; i++){
        const actual = roundMatches[i] || {};
        const pred = npRound[i] || {};
        if(!actual.played) continue;
        if(["R32","R16","QF"].includes(round)){
          if(pred.qualifiedTeam && actual.winner && pred.qualifiedTeam === actual.winner) pts += NEW_PROGRESS;
          if(pred.score1 !== undefined && pred.score2 !== undefined && actual.score1 === pred.score1 && actual.score2 === pred.score2) pts += NEW_SCORE;
        }
      }
    }
    return pts;
  }

  // ==================== NEW PREDICTIONS ====================
  function renderNewPred(){
    const panel = el("tab-newpred");
    let html = `<div class="section-header"><h2>🔮 New Predictions</h2><p>Primary: +5 per correct advancing team • Bonus: +10 correct score</p></div>`;

    for(const round of ROUNDS){
      html += `<div class="round-section"><h3 class="round-title">${ROUND_LABELS[round]}</h3><div class="og-grid">`;
      for(let i=0; i<MATCH_COUNT[round]; i++){
        html += renderNewPredMatch(round, i);
      }
      html += `</div></div>`;
    }

    // Phase 1 + Phase 2
    html += `
      <div class="round-section">
        <h3 class="round-title">My Predicted Advancing Teams</h3>
        <div class="card">
          <h4>Teams reaching Round of 16</h4>
          <div id="newpred-r16-advancing-teams"></div>
          <button onclick="savePredictedAdvancingTeams('R16')" class="save-btn" style="background:#6366f1;margin-top:8px">Save</button>
        </div>
        <div class="card" style="margin-top:1rem">
          <h4>Teams reaching Quarter Finals</h4>
          <div id="newpred-qf-advancing-teams"></div>
          <button onclick="savePredictedAdvancingTeams('QF')" class="save-btn" style="background:#6366f1;margin-top:8px">Save</button>
        </div>
      </div>

      <div class="round-section">
        <h3 class="round-title">My Predicted Fixtures (Phase 2)</h3>
        <div class="card">
          <h4>Predicted R16 Matches</h4>
          <div id="predicted-r16-fixtures"></div>
          <button onclick="addPredictedFixture('R16')" class="save-btn" style="background:#6366f1;margin-top:8px">+ Add Predicted Match</button>
        </div>
      </div>
    `;

    panel.innerHTML = html;
    bindNewPredInputs();
    setTimeout(() => {
      renderPredictedAdvancingTeams();
      renderPredictedFixtures();
    }, 100);
  }

  function renderNewPredMatch(round, idx){
    const actual = state.matches?.[round]?.[idx] || {};
    const pred = state.newpred?.harry?.[round]?.[idx] || {};
    const team1 = actual.team1 || "";
    const team2 = actual.team2 || "";
    const hasTeams = team1 && team2;

    return `
      <div class="match-card">
        <div class="match-id">${ROUND_LABELS[round]} Match ${idx+1}</div>
        ${hasTeams ? `<div>${team1} vs ${team2}</div>` : `<div class="pending">Fixture not set</div>`}
        <div style="margin-top:8px">
          <input class="np-input score-input" data-round="${round}" data-idx="${idx}" data-field="score1" type="number" placeholder="0" value="${pred.score1 ?? ''}">
          <span>–</span>
          <input class="np-input score-input" data-round="${round}" data-idx="${idx}" data-field="score2" type="number" placeholder="0" value="${pred.score2 ?? ''}">
        </div>
        <div style="margin-top:6px">
          <label>Who qualifies?</label><br>
          ${hasTeams 
            ? `<select class="np-input" data-round="${round}" data-idx="${idx}" data-field="qualifiedTeam">
                 <option value="">Select</option>
                 <option value="${team1}" ${pred.qualifiedTeam===team1?'selected':''}>${team1}</option>
                 <option value="${team2}" ${pred.qualifiedTeam===team2?'selected':''}>${team2}</option>
               </select>`
            : `<input class="np-input" data-round="${round}" data-idx="${idx}" data-field="qualifiedTeam" type="text" placeholder="Set in Admin" value="${pred.qualifiedTeam||''}">`
          }
        </div>
      </div>
    `;
  }

  function bindNewPredInputs(){
    document.querySelectorAll(".np-input").forEach(input => {
      input.addEventListener("change", async (e) => {
        const { round, idx, field } = e.target.dataset;
        let val = e.target.value;
        if (["score1","score2"].includes(field)) val = val === "" ? null : Number(val);
        await set(ref(db, `newpred/harry/${round}/${idx}/${field}`), val);
      });
    });
  }

  // ==================== PHASE 1: Predicted Advancing Teams ====================
  function renderPredictedAdvancingTeams(){
    const r16 = document.getElementById("newpred-r16-advancing-teams");
    const qf = document.getElementById("newpred-qf-advancing-teams");
    if(r16) r16.innerHTML = createTeamCheckboxes(getAvailableTeamsForMatch("R16"), state.newpred?.harry?.predictedAdvancing?.R16 || [], "R16");
    if(qf) qf.innerHTML = createTeamCheckboxes(getAvailableTeamsForMatch("QF"), state.newpred?.harry?.predictedAdvancing?.QF || [], "QF");
  }

  function createTeamCheckboxes(teams, selected, round){
    let html = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:4px">`;
    teams.forEach(t => {
      html += `<label><input type="checkbox" value="${t}" ${selected.includes(t)?'checked':''} data-round="${round}"> ${t}</label>`;
    });
    return html + `</div>`;
  }

  window.savePredictedAdvancingTeams = async (round) => {
    const container = document.getElementById(round === "R16" ? "newpred-r16-advancing-teams" : "newpred-qf-advancing-teams");
    const selected = Array.from(container.querySelectorAll("input:checked")).map(cb => cb.value);
    if(!state.newpred.harry) state.newpred.harry = {};
    if(!state.newpred.harry.predictedAdvancing) state.newpred.harry.predictedAdvancing = {};
    state.newpred.harry.predictedAdvancing[round] = selected;
    await set(ref(db, `newpred/harry/predictedAdvancing/${round}`), selected);
    alert(`Saved for ${round}`);
  };

  // ==================== PHASE 2: Predicted Fixtures ====================
  function renderPredictedFixtures(){
    const container = document.getElementById("predicted-r16-fixtures");
    if(!container) return;
    const fixtures = state.newpred?.harry?.predictedFixtures?.R16 || [];
    let html = "";
    fixtures.forEach((f, index) => {
      html += `<div style="margin-bottom:6px">${f.team1} vs ${f.team2} → Predicted: ${f.score1}-${f.score2}</div>`;
    });
    container.innerHTML = html || "<i>No predicted matches yet</i>";
  }

  window.addPredictedFixture = async (round) => {
    const advancing = state.newpred?.harry?.predictedAdvancing?.[round] || [];
    if(advancing.length < 2){ alert("Add advancing teams first"); return; }

    const team1 = prompt("Team 1:", advancing[0]);
    const team2 = prompt("Team 2:", advancing[1]);
    const score1 = prompt("Predicted score for Team 1:");
    const score2 = prompt("Predicted score for Team 2:");

    if(!team1 || !team2) return;

    if(!state.newpred.harry.predictedFixtures) state.newpred.harry.predictedFixtures = {};
    if(!state.newpred.harry.predictedFixtures[round]) state.newpred.harry.predictedFixtures[round] = [];

    state.newpred.harry.predictedFixtures[round].push({
      team1, team2, score1: Number(score1), score2: Number(score2)
    });

    await set(ref(db, `newpred/harry/predictedFixtures/${round}`), state.newpred.harry.predictedFixtures[round]);
    renderPredictedFixtures();
  };

  // ==================== ADMIN ====================
  function renderAdmin(){
    const container = document.getElementById("admin-container");
    let html = "";
    for(const round of ROUNDS){
      html += `<div class="round-section"><h3>${ROUND_LABELS[round]}</h3><div class="admin-grid">`;
      for(let i=0; i<MATCH_COUNT[round]; i++) html += renderCleanAdminMatch(round, i);
      html += `</div></div>`;
    }
    container.innerHTML = html;
    bindCleanAdminInputs();
  }

  function renderCleanAdminMatch(round, idx){
    const m = state.matches?.[round]?.[idx] || {};
    const options = getAvailableTeamsForMatch(round);
    const isTie = m.score1 === m.score2 && m.score1 !== undefined;
    const hasResult = m.played && m.winner;

    return `
      <div class="match-card" id="admin-${round}-${idx}">
        <div>${ROUND_LABELS[round]} Match ${idx+1}</div>
        <div style="display:flex;gap:6px;margin:8px 0">
          <select data-round="${round}" data-idx="${idx}" data-field="team1">${options.map(t => `<option value="${t}" ${m.team1===t?'selected':''}>${t}</option>`).join('')}</select>
          <span>vs</span>
          <select data-round="${round}" data-idx="${idx}" data-field="team2">${options.map(t => `<option value="${t}" ${m.team2===t?'selected':''}>${t}</option>`).join('')}</select>
        </div>
        <div style="display:flex;gap:6px">
          <input type="number" data-field="score1" placeholder="0" value="${m.score1 ?? ''}" style="width:60px">
          <span>–</span>
          <input type="number" data-field="score2" placeholder="0" value="${m.score2 ?? ''}" style="width:60px">
        </div>
        ${isTie ? `<select data-field="winner"><option value="">Winner</option><option value="${m.team1}">${m.team1}</option><option value="${m.team2}">${m.team2}</option></select>` : ''}
        <div style="margin-top:8px">
          <button onclick="saveMatchFixtures('${round}',${idx})" style="background:#6366f1">Save Fixtures</button>
          <button onclick="saveCleanMatchResult('${round}',${idx})">Save Result</button>
          ${hasResult ? `<span class="badge correct">Result Saved</span>` : (m.team1 && m.team2 ? `<span class="badge">Fixtures Saved</span>` : '')}
        </div>
      </div>`;
  }

  function getAvailableTeamsForMatch(round){
    if(round === "R32") return ["ARG","BRA","FRA","ENG","ESP","GER","POR","NED","BEL","CRO","URU","COL","MEX","USA","CAN","JPN","MAR","SEN"];
    const prev = {R16:"R32", QF:"R16", SF:"QF", F:"SF"}[round];
    const set = new Set();
    Object.values(state.matches?.[prev] || {}).forEach(m => { if(m.team1) set.add(m.team1); if(m.team2) set.add(m.team2); });
    return Array.from(set);
  }

  function bindCleanAdminInputs(){
    // Auto show winner dropdown on tie
  }

  window.saveMatchFixtures = async (round, idx) => {
    const card = document.getElementById(`admin-${round}-${idx}`);
    const t1 = card.querySelector('[data-field="team1"]').value;
    const t2 = card.querySelector('[data-field="team2"]').value;
    if(!t1 || !t2) return alert("Select teams");
    await set(ref(db, `matches/${round}/${idx}`), {team1:t1, team2:t2, played:false});
    renderAdmin();
  };

  window.saveCleanMatchResult = async (round, idx) => {
    const card = document.getElementById(`admin-${round}-${idx}`);
    const t1 = card.querySelector('[data-field="team1"]').value;
    const t2 = card.querySelector('[data-field="team2"]').value;
    const s1 = parseInt(card.querySelector('[data-field="score1"]').value);
    const s2 = parseInt(card.querySelector('[data-field="score2"]').value);
    let winner = card.querySelector('[data-field="winner"]')?.value || (s1 > s2 ? t1 : t2);

    if(!t1 || !t2 || isNaN(s1) || isNaN(s2)) return alert("Fill all fields");

    await set(ref(db, `matches/${round}/${idx}`), {team1:t1, team2:t2, score1:s1, score2:s2, winner, played:true});
    renderAdmin();
  };

</script>

<style>
  body { background:#0a0e1a; color:#e8edf5; font-family:system-ui; }
  .tab-panel { padding:1rem; max-width:1100px; margin:auto; }
  .admin-grid, .og-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1rem; }
  .match-card { background:#111827; border:1px solid #2a3550; padding:12px; border-radius:10px; }
  .save-btn { background:#22c55e; color:white; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; }
  .badge { font-size:0.75rem; padding:2px 8px; border-radius:999px; background:#22c55e22; color:#22c55e; }
</style>
</head>
<body>
<div id="root"></div>
</body>
</html>
